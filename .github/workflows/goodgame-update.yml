name: GoodGame Axınlarını Yenilə

on:
  schedule:
    - cron: '*/5 * * * *'  # Hər 5 dəqiqədən bir
  workflow_dispatch:  # Əllə işə salmaq

concurrency:
  group: goodgame-update
  cancel-in-progress: false

jobs:
  update-streams:
    runs-on: ubuntu-latest
    
    steps:
    - name: Reponu yüklə
      uses: actions/checkout@v4
    
    - name: Python-u qur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Lazım olan paketləri yüklə
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Konfiqurasiya faylını yoxla
      run: |
        if [ ! -f "goodgame-config.json" ]; then
          echo "Creating default configuration..."
          cat > goodgame-config.json << 'EOF'
        [
          {
            "id": 160450,
            "channel_name": "Dartval",
            "url": "https://goodgame.ru/Dartval#autoplay",
            "quality": "720p",
            "enabled": true,
            "description": "Dartval gaming stream"
          }
        ]
        EOF
        fi
    
    - name: Yeniləmə skriptini işlə
      run: python goodgame.py
      env:
        GITHUB_ACTIONS: true
    
    - name: Dəyişiklikləri yadda saxla və göndər
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add goodgame/
        git add goodgame-config.json
        git add -u goodgame/
        git diff --quiet && git diff --staged --quiet || (git commit -m "GoodGame axınları yeniləndi [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
