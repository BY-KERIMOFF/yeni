name: Update Catcast Streams

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catcast-update
  cancel-in-progress: false

jobs:
  update-streams:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run update script
      run: python catcast.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Dəyişiklikləri əlavə et
        git add catcast/
        
        # Əgər dəyişiklik varsa commit və push et, yoxdursa sakitcə keç
        if ! git diff --cached --quiet; then
          git commit -m "Update Catcast streams [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
          git push
        else
          echo "Heç bir dəyişiklik aşkar edilmədi."
        fi
