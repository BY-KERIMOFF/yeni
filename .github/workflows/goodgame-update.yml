name: GoodGame Ax谋nlar谋n谋 Yenil蓹

on:
  schedule:
    - cron: '*/5 * * * *'  # H蓹r 5 d蓹qiq蓹d蓹n bir i艧l蓹
  workflow_dispatch:  # 茝ll蓹 i艧蓹 salmaq 眉莽眉n

concurrency:
  group: goodgame-update
  cancel-in-progress: false  # 茝vv蓹lki i艧 bit蓹n蓹 q蓹d蓹r g枚zl蓹

jobs:
  update-streams:
    runs-on: ubuntu-latest
    
    steps:
    - name: Reponu y眉kl蓹
      uses: actions/checkout@v4
    
    - name: Python-u qur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Laz谋m olan paketl蓹ri y眉kl蓹
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Konfiqurasiya fayl谋n谋 yoxla
      run: |
        if [ ! -f "goodgame-config.json" ]; then
          echo "Creating default configuration..."
          cat > goodgame-config.json << 'EOF'
        [
          {
            "id": 160450,
            "channel_name": "Dartval",
            "url": "https://goodgame.ru/Dartval#autoplay",
            "quality": "720p",
            "enabled": true,
            "description": "Dartval gaming stream"
          }
        ]
        EOF
        fi
    
    - name: Yenil蓹m蓹 skriptini i艧l蓹
      run: python goodgame.py
    
    - name: D蓹yi艧iklikl蓹ri yadda saxla v蓹 g枚nd蓹r
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add goodgame/
        git add goodgame-config.json
        git add -u goodgame/
        git diff --quiet && git diff --staged --quiet || (git commit -m "GoodGame ax谋nlar谋 yenil蓹ndi [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
